name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Diagnostic Verify
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v4
      with:
        allow-checksums: a5e75118d96b4eac2100876f6af6a5ca5029cd440f87736425350fb4cf308b42,b3a875ddc1f044746e1b1a55f645584505f4a10438c1afea9f15e92a7c42ec13

    - name: Configure Gradle Execution
      run: |
        chmod +x gradlew
        # Pre-create the debug keystore if not present so signature fallback is successful
        mkdir -p $HOME/.android
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true

    - name: Build Application Artifacts
      run: ./gradlew assembleRelease bundleRelease assembleDebug bundleDebug --no-daemon

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Galaxy-FM-Demo-Release-APK
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: Galaxy-FM-Demo-Release-AAB
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Galaxy-FM-Demo-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Debug AAB
      uses: actions/upload-artifact@v4
      with:
        name: Galaxy-FM-Demo-Debug-AAB
        path: app/build/outputs/bundle/debug/app-debug.aab

    - name: Upload Build ProGuard Mapping File
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ProGuard-Mapping-Log
        path: app/build/outputs/mapping/release/mapping.txt

    - name: Upload Build Metrics and System Logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: gradle-build-logs
        path: |
          app/build/reports/
          app/build/test-results/
